# Model Configuration
models:
  groq:
    model_name: "llama3-8b-8192"
    temperature: 0.1
    max_tokens: 4096
  openai:
    model_name: "gpt-4-turbo-preview"
    temperature: 0.1
    max_tokens: 4096

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  debug: true
  title: "Dynamic Research Assistant API"
  description: "Advanced AI research assistant with dynamic workflow management"
  version: "1.0.0"

# Search Configuration
search:
  max_results: 10
  timeout: 30
  user_agent: "Research Assistant Bot"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/research_assistant.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5

# Agent Configuration
agents:
  max_iterations: 10
  timeout: 300
  memory_limit: 1000
